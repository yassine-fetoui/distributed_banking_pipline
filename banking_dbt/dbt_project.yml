
name: 'banking_dbt'
version: '1.0.0'
config-version: 2

profile: 'banking_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  banking_dbt:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: analytics
      dimension:
        +group: core
      facts:
        +group: core
    example:
      +materialized: view

snapshots:
  banking_dbt:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at
